# Weekly cargo-fuzz for provii-audit (crate in rust/, fuzz crate in rust/fuzz/). Schedule + dispatch.
# Standalone lib: no sibling path-deps to clone.
name: Weekly Fuzzing

on:
  schedule:
    - cron: '0 3 * * 6'   # Saturdays 03:00 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzzing duration in seconds per target'
        required: false
        default: '300'
        type: string
      target:
        description: 'Specific target to fuzz (empty = all)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FUZZ_DURATION: ${{ github.event.inputs.duration || '300' }}

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write   # file a tracking issue on a crash
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_audit_event_deserialise
          - fuzz_iso8601
          - fuzz_strip_pii
          - fuzz_validate_fields
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # nightly
        with: { toolchain: nightly, components: llvm-tools-preview }
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with: { workspaces: rust, shared-key: fuzz }
      - name: Install cargo-fuzz
        # Not --locked: cargo-fuzz's pinned lockfile drags an old rustix that
        # fails to compile on current nightly (reserved rustc_* attributes).
        # Resolving fresh picks a nightly-compatible rustix.
        run: cargo install cargo-fuzz
      - name: Check if target matches filter
        id: check
        env:
          INPUT_TARGET: ${{ github.event.inputs.target }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          if [ -z "$INPUT_TARGET" ] || [ "$INPUT_TARGET" = "$MATRIX_TARGET" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run fuzzer
        id: fuzz
        if: steps.check.outputs.run == 'true'
        working-directory: rust/fuzz
        env:
          FUZZ_TARGET: ${{ matrix.target }}
          FUZZ_DUR: ${{ env.FUZZ_DURATION }}
        run: |
          echo "Fuzzing ${FUZZ_TARGET} for ${FUZZ_DUR}s..."
          cargo +nightly fuzz run "${FUZZ_TARGET}" -- \
            -max_total_time="${FUZZ_DUR}" -jobs=2 -workers=2 \
            || { echo "::error::Fuzzer found a crash in ${FUZZ_TARGET}"; exit 1; }
      - name: Upload corpus and crash artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          path: |
            rust/fuzz/artifacts/${{ matrix.target }}/
            rust/fuzz/corpus/${{ matrix.target }}/
          retention-days: 30
      - name: File an issue on crash
        if: ${{ failure() && steps.fuzz.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FUZZ_TARGET: ${{ matrix.target }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="Fuzz crash: ${FUZZ_TARGET}"
          if gh issue list --state open --search "in:title \"$TITLE\"" --json title --jq '.[].title' | grep -qxF "$TITLE"; then
            echo "Open issue already tracks $TITLE; skipping."
            exit 0
          fi
          gh issue create --title "$TITLE" \
            --label fuzzing,bug \
            --body "cargo-fuzz found a crash in \`${FUZZ_TARGET}\`. Reproducer + corpus attached to the run: ${RUN_URL}."
